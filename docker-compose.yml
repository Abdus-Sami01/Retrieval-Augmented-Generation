services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - rag-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3

  ui:
    build: .
    command: ["python", "rag/ui.py"]
    ports:
      - "7860:7860"
    environment:
      RAG_API_BASE_URL: "http://api:8000"
      GRADIO_SERVER_NAME: "0.0.0.0"
    depends_on:
      api:
        condition: service_healthy

volumes:
  rag-data:
